syntax = "proto3";

package cybersuite.provider.v1;

// NOTE: Transport may use protobuf/gRPC.
// Canonical hashing/binding in Stage 4 is defined in ARCHITECTURE_CANON (canonical binary encoding).
// Providers MUST ensure semantic equivalence between transported fields and canonical hashing fields.

message ProtocolVersion {
  uint32 major = 1;
  uint32 minor = 2;
}

enum ExecutionProfile {
  DEV = 0;
  STAGING = 1;
  PROD = 2;
}

message ClientHello {
  ProtocolVersion version = 1;
  bytes nonce32 = 2;              // 32 bytes
  bytes policy_hash_sha384 = 3;   // 48 bytes
  ExecutionProfile profile = 4;
  bool fips_required = 5;
  bool experimental_allowed = 6;

  string tenant_id = 7;
  string expected_provider_id = 8;
  string expected_build_hash = 9;
}

message ProviderIdentity {
  string provider_id = 1;
  string version = 2;
  string build_hash = 3;
  string signature_fingerprint = 4;
}

message ProviderHello {
  ProtocolVersion version = 1;
  bytes nonce32 = 2;                 // 32 bytes
  ProviderIdentity identity = 3;
  bytes capability_hash_sha384 = 4;  // 48 bytes
  bool fips_boundary_declared = 5;
  bool is_experimental = 6;
  bytes attestation_evidence = 7;
}

message Handle128 {
  bytes value16 = 1; // 16 bytes (big-endian canonical)
}

enum MessageType {
  CLIENT_HELLO = 0;
  PROVIDER_HELLO = 1;
  CAPABILITY_REQUEST = 2;
  CAPABILITY_RESPONSE = 3;
  HEALTH_REQUEST = 4;
  HEALTH_RESPONSE = 5;
  SHUTDOWN_REQUEST = 6;
  SHUTDOWN_RESPONSE = 7;
  ERROR = 100;
}

message RequestHeader {
  ProtocolVersion version = 1;
  MessageType message_type = 2;
  Handle128 request_id = 3;
  uint64 message_counter = 4;
  bytes channel_binding_sha384 = 5; // 48 bytes
}

message Error {
  uint32 code = 1;
  string message = 2; // must not include secrets
}

message ResponseHeader {
  ProtocolVersion version = 1;
  MessageType message_type = 2;
  Handle128 request_id = 3;
  uint64 message_counter = 4;
  bytes channel_binding_sha384 = 5; // 48 bytes
  bool success = 6;
  Error error = 7;
}

message CapabilityRequest {
  RequestHeader header = 1;
}

message CapabilityResponse {
  ResponseHeader header = 1;
  bytes capability_canonical_bytes = 2;
  bytes capability_hash_sha384 = 3; // 48 bytes
}

message HealthRequest {
  RequestHeader header = 1;
}

message HealthResponse {
  ResponseHeader header = 1;
  bool is_healthy = 2;
}

message ShutdownRequest {
  RequestHeader header = 1;
  bool graceful = 2;
}

message ShutdownResponse {
  ResponseHeader header = 1;
}